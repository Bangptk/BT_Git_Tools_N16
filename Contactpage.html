<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Modern Glass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Tạo nền gradient màu mè giống ảnh của bạn */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%), 
                        linear-gradient(to top, #a18cd1 0%, #fbc2eb 100%);
            background-blend-mode: overlay;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Hiệu ứng kính mờ (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            overflow: hidden;
        }

        /* Bên trái: Thông tin */
        .contact-sidebar {
            background: rgba(0, 0, 0, 0.05);
            padding: 40px;
            color: #333;
        }

        .contact-sidebar h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #222;
            border-bottom: 3px solid #ff4b2b;
            display: inline-block;
        }

        .info-box {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        
        .info-box:hover { transform: translateX(10px); }

        .icon-circle {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .icon-circle i { color: #ff4b2b; font-size: 20px; }

        .text-info p { margin: 0; font-size: 14px; font-weight: 600; color: #444; }
        .text-info span { font-size: 13px; color: #666; }

        /* Bên phải: Form và Map */
        .main-content {
            padding: 40px;
            background: rgba(255, 255, 255, 0.4);
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            outline: none;
            font-size: 14px;
        }

        input:focus, textarea:focus { background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }

        .btn-send {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
            transition: 0.3s;
        }

        .btn-send:hover { transform: scale(1.05); }

        .mini-map {
            margin-top: 30px;
            height: 150px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.5);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .glass-card { grid-template-columns: 1fr; }
            .input-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="contact-sidebar">
        <h1>CONTACT</h1>
        
        <div class="info-box">
            <div class="icon-circle"><i class="fas fa-phone"></i></div>
            <div class="text-info">
                <span>Phone Number</span>
                <p>0326.104.339</p>
            </div>
        </div>

        <div class="info-box">
            <div class="icon-circle"><i class="fas fa-envelope"></i></div>
            <div class="text-info">
                <span>Email Address</span>
                <p>trump@gmail.com</p>
            </div>
        </div>

        <div class="info-box">
            <div class="icon-circle"><i class="fas fa-map-marker-alt"></i></div>
            <div class="text-info">
                <span>Location</span>
                <p>123 Lê Lợi, Q.1, TP.HCM</p>
            </div>
        </div>
    </div>

    <div class="main-content">
        <form>
            <div class="input-group">
                <input type="text" placeholder="Họ tên">
                <input type="email" placeholder="Email">
            </div>
            <textarea rows="4" placeholder="Bạn cần hỗ trợ gì?"></textarea>
            <br>
            <button type="button" class="btn-send">GỬI YÊU CẦU</button>
        </form>

        <div class="mini-map">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m12!1m3!1d3919.450123456!2d106.698!3d10.771!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f3f1234567!2zMTIzIEzDqiBM4bujaSwgQuG6v24gTmdow6ksIFF14bqtbiAx!5e0!3m2!1svi!2s!4v123456789" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </div>
</div>

</body>
</html>
