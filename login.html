<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập | SportZone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #ff4d00;
        --primary-light: #ff7733;
        --primary-dark: #cc3d00;
        --accent: #ffb300;
        --dark: #0d0d1a;
        --dark-2: #141428;
        --dark-3: #1c1c35;
        --white: #ffffff;
        --gray-100: #f8f9fa;
        --gray-200: #f0f0f5;
        --gray-300: #e2e2ec;
        --gray-500: #9999aa;
        --gray-700: #444455;
      }

      body {
        font-family: "Outfit", "Segoe UI", sans-serif;
        min-height: 100vh;
        display: flex;
        background: var(--dark);
        overflow: hidden;
      }

      /* ===== LEFT PANEL ===== */
      .left-panel {
        flex: 1;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        padding: 60px 40px;
        overflow: hidden;
      }

      .left-panel::before {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 87, 34, 0.15) 0%,
          transparent 70%
        );
        top: -100px;
        left: -100px;
      }

      .left-panel::after {
        content: "";
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(0, 188, 212, 0.1) 0%,
          transparent 70%
        );
        bottom: -80px;
        right: -60px;
      }

      .brand {
        position: relative;
        z-index: 1;
        text-align: center;
        margin-bottom: 50px;
      }

      .brand-logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #ff5722, #ff9800);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 36px;
        box-shadow: 0 10px 30px rgba(255, 87, 34, 0.4);
      }

      .brand h1 {
        font-size: 42px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 2px;
      }

      .brand h1 span {
        color: #ff5722;
      }

      .brand p {
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 6px;
      }

      .features {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
        max-width: 340px;
      }

      .feature-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        backdrop-filter: blur(10px);
        transition: transform 0.3s ease;
      }

      .feature-item:hover {
        transform: translateX(6px);
      }

      .feature-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }

      .feature-icon.orange {
        background: rgba(255, 87, 34, 0.2);
      }
      .feature-icon.blue {
        background: rgba(0, 188, 212, 0.2);
      }
      .feature-icon.green {
        background: rgba(76, 175, 80, 0.2);
      }

      .feature-text h4 {
        color: #fff;
        font-size: 14px;
        font-weight: 600;
      }

      .feature-text p {
        color: rgba(255, 255, 255, 0.45);
        font-size: 12px;
        margin-top: 2px;
      }

      /* ===== RIGHT PANEL ===== */
      .right-panel {
        width: 480px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        padding: 50px 50px;
        position: relative;
      }

      .login-box {
        width: 100%;
        max-width: 380px;
      }

      .login-header {
        margin-bottom: 36px;
      }

      .login-header h2 {
        font-size: 30px;
        font-weight: 800;
        color: #1a1a2e;
      }

      .login-header p {
        color: #888;
        font-size: 14px;
        margin-top: 8px;
      }

      .login-header p a {
        color: #ff5722;
        text-decoration: none;
        font-weight: 600;
      }

      .login-header p a:hover {
        text-decoration: underline;
      }

      /* Social Login */
      .social-login {
        display: flex;
        gap: 12px;
        margin-bottom: 28px;
      }

      .social-btn {
        flex: 1;
        padding: 12px;
        border: 1.5px solid #e8e8e8;
        border-radius: 12px;
        background: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #333;
        transition: all 0.25s ease;
      }

      .social-btn:hover {
        background: #f5f5f5;
        border-color: #ccc;
        transform: translateY(-1px);
      }

      .social-btn img {
        width: 20px;
        height: 20px;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e8e8e8;
      }

      .divider span {
        color: #aaa;
        font-size: 13px;
        white-space: nowrap;
      }

      /* Form */
      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
      }

      .input-wrapper {
        position: relative;
      }

      .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: #aaa;
        pointer-events: none;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px 14px 46px;
        border: 1.5px solid #e8e8e8;
        border-radius: 12px;
        font-size: 14px;
        color: #1a1a2e;
        background: #fafafa;
        outline: none;
        transition: all 0.25s ease;
      }

      .form-group input:focus {
        border-color: #ff5722;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(255, 87, 34, 0.08);
      }

      .form-group input::placeholder {
        color: #bbb;
      }

      .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        color: #aaa;
        padding: 4px;
        transition: color 0.2s;
      }

      .toggle-password:hover {
        color: #ff5722;
      }

      /* Remember & Forgot */
      .form-options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 13px;
        color: #555;
        user-select: none;
      }

      .remember-me input[type="checkbox"] {
        display: none;
      }

      .checkmark {
        width: 18px;
        height: 18px;
        border: 1.5px solid #ddd;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }

      .remember-me input:checked ~ .checkmark {
        background: #ff5722;
        border-color: #ff5722;
      }

      .remember-me input:checked ~ .checkmark::after {
        content: "✓";
        color: #fff;
        font-size: 11px;
        font-weight: 700;
      }

      .forgot-link {
        font-size: 13px;
        color: #ff5722;
        text-decoration: none;
        font-weight: 600;
      }

      .forgot-link:hover {
        text-decoration: underline;
      }

      /* Submit Button */
      .btn-login {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #ff5722, #ff9800);
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
        box-shadow: 0 6px 20px rgba(255, 87, 34, 0.35);
        position: relative;
        overflow: hidden;
      }

      .btn-login::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        transition: left 0.4s ease;
      }

      .btn-login:hover::before {
        left: 100%;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(255, 87, 34, 0.45);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      /* Footer */
      .login-footer {
        text-align: center;
        margin-top: 24px;
      }

      .login-footer p {
        font-size: 13px;
        color: #888;
      }

      .login-footer a {
        color: #ff5722;
        font-weight: 700;
        text-decoration: none;
      }

      .login-footer a:hover {
        text-decoration: underline;
      }

      .terms {
        margin-top: 16px;
        font-size: 11px;
        color: #bbb;
        text-align: center;
        line-height: 1.6;
      }

      .terms a {
        color: #888;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 900px) {
        .left-panel {
          display: none;
        }
        .right-panel {
          width: 100%;
        }
      }

      @media (max-width: 480px) {
        .right-panel {
          padding: 40px 24px;
        }
      }
    </link>
  </head>
  <body>
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="brand">
        <div class="brand-logo">⚡</div>
        <h1>Sport<span>Zone</span></h1>
        <p>Performance Gear</p>
      </div>

      <div class="features">
        <div class="feature-item">
          <div class="feature-icon orange">🏃</div>
          <div class="feature-text">
            <h4>Hàng chính hãng 100%</h4>
            <p>Nike, Adidas, Puma và nhiều thương hiệu lớn</p>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon blue">🚀</div>
          <div class="feature-text">
            <h4>Giao hàng nhanh toàn quốc</h4>
            <p>Nhận hàng trong 24–48 giờ</p>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon green">🔄</div>
          <div class="feature-text">
            <h4>Đổi trả miễn phí 30 ngày</h4>
            <p>Không hài lòng, hoàn tiền 100%</p>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="login-box">
        <div class="login-header">
          <h2>Chào mừng trở lại 👋</h2>
          <p>Chưa có tài khoản? <a href="#">Đăng ký ngay</a></p>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <button class="social-btn">
            <svg width="20" height="20" viewBox="0 0 48 48">
              <path
                fill="#EA4335"
                d="M24 9.5c3.15 0 5.64 1.09 7.7 2.87l5.73-5.73C33.68 3.5 29.19 1.5 24 1.5 14.74 1.5 7.01 7.22 3.96 15.18l6.64 5.16C12.14 14.07 17.6 9.5 24 9.5z"
              />
              <path
                fill="#4285F4"
                d="M46.14 24.5c0-1.67-.15-3.28-.43-4.84H24v9.17h12.44c-.54 2.89-2.18 5.34-4.65 6.99l7.18 5.58C43.23 37.2 46.14 31.27 46.14 24.5z"
              />
              <path
                fill="#FBBC05"
                d="M10.61 28.34A14.56 14.56 0 0 1 9.5 24c0-1.51.26-2.97.71-4.34l-6.64-5.16A23.5 23.5 0 0 0 .5 24c0 3.85.92 7.49 2.55 10.68l7.56-6.34z"
              />
              <path
                fill="#34A853"
                d="M24 46.5c5.16 0 9.5-1.71 12.66-4.65l-7.18-5.58c-1.74 1.17-3.97 1.86-5.48 1.86-6.37 0-11.82-4.57-13.39-10.79l-7.56 6.34C7.01 40.78 14.74 46.5 24 46.5z"
              />
            </svg>
            Google
          </button>
          <button class="social-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
              <path
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
              />
            </svg>
            Facebook
          </button>
        </div>

        <div class="divider">
          <span>hoặc đăng nhập bằng email</span>
        </div>

        <!-- Login Form -->
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input
                type="email"
                id="email"
                placeholder="example@email.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                id="password"
                placeholder="Nhập mật khẩu của bạn"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="toggle-password"
                onclick="togglePassword()"
                title="Hiện/ẩn mật khẩu"
              >
                👁️
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember" />
              <span class="checkmark"></span>
              Ghi nhớ đăng nhập
            </label>
            <a href="#" class="forgot-link">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-login">Đăng Nhập</button>
        </form>

        <div class="login-footer">
          <p>Chưa có tài khoản? <a href="#">Tạo tài khoản miễn phí</a></p>
        </div>

        <p class="terms">
          Khi đăng nhập, bạn đồng ý với
          <a href="#">Điều khoản dịch vụ</a> và
          <a href="#">Chính sách bảo mật</a> của SportZone.
        </p>
      </div>
    </div>

    <script>
      function togglePassword() {
        const input = document.getElementById("password");
        const btn = document.querySelector(".toggle-password");
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "🙈";
        } else {
          input.type = "password";
          btn.textContent = "👁️";
        }
      }

      function handleLogin(e) {
        e.preventDefault();
        const btn = document.querySelector(".btn-login");
        btn.textContent = "Đang đăng nhập...";
        btn.disabled = true;
        setTimeout(() => {
          btn.textContent = "✅ Đăng nhập thành công!";
          btn.style.background = "linear-gradient(135deg, #4caf50, #66bb6a)";
        }, 1500);
      }
    </script>
  </body>
</html>
