<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử mua hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto bg-white shadow-md rounded-lg overflow-hidden">
        <div class="p-6 border-b border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800">Lịch sử đơn hàng</h2>
        </div>
        
        <div class="p-6 space-y-6">
            <div class="border rounded-lg p-4 hover:border-blue-500 transition">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <span class="font-semibold">Mã đơn hàng: #12345</span>
                        <p class="text-sm text-gray-500">Ngày đặt: 02/03/2026</p>
                    </div>
                    <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm">Đã giao hàng</span>
                </div>
                <div class="flex items-center gap-4">
                    <img src="https://via.placeholder.com/80" alt="Giày" class="w-20 h-20 object-cover rounded">
                    <div class="flex-1">
                        <h4 class="font-medium">Giày Chạy Bộ Nike Air Max</h4>
                        <p class="text-sm text-gray-500">Số lượng: 1 | Size: 42</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-red-600">2.500.000đ</p>
                        <button class="mt-2 text-blue-600 text-sm hover:underline">Xem chi tiết</button>
                    </div>
                </div>
            </div>

            <div class="border rounded-lg p-4">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <span class="font-semibold">Mã đơn hàng: #12340</span>
                        <p class="text-sm text-gray-500">Ngày đặt: 25/02/2026</p>
                    </div>
                    <span class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded-full text-sm">Đang vận chuyển</span>
                </div>
                <div class="flex items-center gap-4">
                    <img src="https://via.placeholder.com/80" alt="Áo" class="w-20 h-20 object-cover rounded">
                    <div class="flex-1">
                        <h4 class="font-medium">Áo Thể Thao Adidas Performance</h4>
                        <p class="text-sm text-gray-500">Số lượng: 2 | Size: L</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-red-600">1.200.000đ</p>
                        <button class="mt-2 text-blue-600 text-sm hover:underline">Theo dõi đơn hàng</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
